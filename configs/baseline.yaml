run_name: baseline

dataset:
  documents_path: examples/sample_documents.jsonl
  questions_path: examples/sample_questions.jsonl

chunking:
  strategy: fixed
  chunk_size: 500
  chunk_overlap: 80

embedding:
  provider: hash
  model: hash-embedding-v1
  dimensions: 384

retriever:
  top_k: 3

report:
  output_dir: outputs
